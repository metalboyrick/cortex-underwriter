[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fmt]
line_length = 120

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
localhost = "http://localhost:8545"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
